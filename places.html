<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Да суседзяу́ — 5 достопримечательностей</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="home">
    <main class="places-page">
      <header class="places-header">
        <a class="back-link" href="index.html">← На главную</a>
        <h1>5 достопримечательностей маршрута «Маршруты памяти»</h1>
      </header>

      <section class="slider" aria-label="Слайдер достопримечательностей">
        <button
          class="slider-btn"
          id="prevBtn"
          aria-label="Предыдущая карточка"
        >
          ←
        </button>

        <article class="slide-card" id="slideCard">
          <img
            class="slide-image"
            id="slideImage"
            src=""
            alt=""
            loading="eager"
          />
          <div class="slide-content">
            <p class="slide-index" id="slideIndex"></p>
            <div class="slide-title-row">
              <h2 id="slideTitle"></h2>
              <img
                class="boutonniere"
                src="бутоньерка2.jpg"
                alt=""
                aria-hidden="true"
              />
            </div>
            <p class="slide-location" id="slideLocation"></p>
            <div class="slide-story">
              <div class="slide-text" id="slideText"></div>
            </div>
          </div>
        </article>

        <button class="slider-btn" id="nextBtn" aria-label="Следующая карточка">
          →
        </button>
      </section>
    </main>

    <script src="slider.js"></script>
  </body>
</html>
